<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediFlow Login</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b1220;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:#e5e7eb;
}

/* CARD */
.login-box{
    width:320px;
    padding:30px;
    background:#111827;
    border:1px solid #1f2937;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#60a5fa;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #1f2937;
    background:#0b1220;
    color:#fff;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#60a5fa;
    color:#0b1220;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#3b82f6;
}

.small{
    text-align:center;
    font-size:12px;
    margin-top:10px;
    color:#9ca3af;
}

a{
    color:#60a5fa;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>MediFlow AI</h2>

    <input type="text" placeholder="Email">
    <input type="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <div class="small">
        No account? <a href="#">Sign up</a>
    </div>
</div>

<script>
function login(){
    alert("Login UI only (no backend yet). Next step: connect Firebase/Auth system.");
}
</script>

</body>
</html>
